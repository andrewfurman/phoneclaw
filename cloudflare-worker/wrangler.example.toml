name = "phoneclaw"
main = "cloudflare-worker/twilio-elevenlabs-worker.mjs"
compatibility_date = "2026-06-18"
account_id = "replace-with-cloudflare-account-id"
workers_dev = true

# Optional custom domain route.
# routes = [
#   { pattern = "webhooks.example.com", custom_domain = true }
#   { pattern = "phoneclaw.example.com", custom_domain = true }
# ]

[observability]
enabled = true

# Optional but recommended for after-the-fact Twilio call troubleshooting.
[[kv_namespaces]]
binding = "TWILIO_EVENT_LOGS"
id = "replace-with-kv-namespace-id"

[vars]
ELEVENLABS_AGENT_ID = "replace-with-elevenlabs-agent-id"
ELEVENLABS_API_BASE = "https://api.elevenlabs.io"
ELEVENLABS_TELEPHONY_AUDIO_FORMAT = "ulaw_8000"
TWILIO_PHONE_NUMBER = "+15555550123"
TWILIO_EVENT_LOG_TTL_SECONDS = "604800"
# Keep real values in Worker secrets or uncommitted wrangler.toml.
# CLI_BRIDGE_URL = "https://private-cli-bridge.example.com"
# VISUALIZER_PASSWORD and VISUALIZER_SESSION_SECRET should be Worker secrets.
